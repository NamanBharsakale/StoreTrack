services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-storetrack}
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-storetrack}"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/storetrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-storetrack}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
